version: '3.8'

services:

  app:
    image: anjuadmin123456789/docker-demo:latest
    container_name: node-app
    healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000"]
        interval: 30s
        timeout: 10s
        retries: 3  
    restart: always
    mem_limit: 512m
    cpus: 1
    depends_on:
      - db
    networks:
      - my-network

  db:
    image: mysql:5.7
    container_name: mysql-db
    restart: always
    env_file:
      - .env
    mem_limit: 1g
    cpus: 1.5
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - my-network

  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always
    ports:
      - "80:80"
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - my-network

volumes:
  db-data:

networks:
  my-network:
